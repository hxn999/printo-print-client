name: build-release
on:
  push:
    tags:
      - "v*"
  

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            goos: linux
            name: linux-amd64
          - goarch: 386
            goos: linux
            name: linux-386
          - goarch: arm64
            goos: linux
            name: linux-arm64
          - goarch: arm
            goos: linux
            goarm: "7"
            name: linux-armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      
      - name: Set tag name
        id: set_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="nightly-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "tag_name=${TAG}" >> $GITHUB_OUTPUT
          echo "Using tag: ${TAG}"

      # No download step needed — stdlib only, go build is self-contained

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -ldflags "-X main.version=${{ github.ref_name }}" \
            -o "dist/printer-client-${{ github.ref_name }}-${{ matrix.name }}"

      - name: Generate checksum
        run: |
          cd dist
          sha256sum "printer-client-${{ github.ref_name }}-${{ matrix.name }}" \
            > "checksums-${{ matrix.name }}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Merge checksums
        run: |
          cd dist
          cat checksums-*.txt > checksums.txt
          rm checksums-*.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set_tag.outputs.tag_name }}
          files: dist/*