name: build-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goarch: amd64
            goos: linux
            name: linux-amd64

          - goarch: 386
            goos: linux
            name: linux-386

          - goarch: arm64
            goos: linux
            name: linux-arm64

          - goarch: arm
            goos: linux
            goarm: 7
            name: linux-armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Get version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build binary
        run: |
          mkdir -p dist

          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}

          if [ "${{ matrix.goarch }}" = "arm" ]; then
            export GOARM=${{ matrix.goarm }}
          fi

          go build -ldflags "-X main.version=${VERSION}" \
          -o dist/printer-client-${VERSION}-${{ matrix.name }}

      - name: Generate checksum
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
